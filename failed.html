<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payment Failed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#f7f6f1;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#1b1b1b;
}
.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:28px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
overflow:hidden;
}
.top{
padding:45px 30px;
text-align:center;
}
.logo{
width:72px;
height:72px;
margin:auto;
border-radius:50%;
background:#fff2f2;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
}
.logo svg{
width:40px;
height:40px;
stroke:#d93025;
stroke-width:2.2;
fill:none;
stroke-linecap:round;
stroke-linejoin:round;
}
h1{
font-size:34px;
font-weight:700;
margin-bottom:10px;
}
.sub{
font-size:15px;
color:#777;
line-height:1.6;
}
.line{
border-top:2px dashed #e8e8e8;
position:relative;
}
.line:before,.line:after{
content:"";
position:absolute;
top:-12px;
width:24px;
height:24px;
background:#f7f6f1;
border-radius:50%;
}
.line:before{left:-12px}
.line:after{right:-12px}

.info{
padding:28px;
}

.box{
background:#f6f6f6;
border-radius:18px;
padding:18px;
margin-bottom:24px;
}

.item{
margin-bottom:16px;
}

.item:last-child{
margin-bottom:0;
}

.label{
font-size:13px;
color:#777;
margin-bottom:5px;
}

.value{
font-size:17px;
font-weight:600;
}

.button{
display:block;
width:100%;
text-align:center;
text-decoration:none;
background:#1b1b1b;
color:#fff;
padding:16px;
border-radius:14px;
font-weight:600;
transition:.2s;
}

.button:hover{
opacity:.9;
}
</style>
</head>

<body>

<div class="card">

<div class="top">

<div class="logo">
<svg viewBox="0 0 24 24">
<path d="M18 6L6 18"/>
<path d="M6 6L18 18"/>
</svg>
</div>

<h1>Payment Failed</h1>

<p class="sub">
We couldn't complete your payment.<br>
If any amount was deducted, it will usually be refunded automatically according to your bank's policy.
</p>

</div>

<div class="line"></div>

<div class="info">

<div class="box">

<div class="item">
<div class="label">Status</div>
<div class="value" style="color:#d93025;">Failed</div>
</div>

<div class="item">
<div class="label">Reason</div>
<div class="value">Payment was cancelled or could not be processed.</div>
</div>

<div class="item">
<div class="label">Need Help?</div>
<div class="value">Please try again or contact support.</div>
</div>

</div>

<a href="index.html" class="button">
Try Again
</a>

</div>

</div>

</body>
<script src="pixel.js"></script>
</html>
